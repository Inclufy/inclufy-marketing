    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />

    <meta property="og:title" content="Inclufy Marketing - AI-Powered Marketing Automation" />

    <!-- Twitter -->

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Luxe Design System Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Legacy Font (can be removed if not used) -->

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Theme Color - Updated to Luxe Primary -->
    <meta name="theme-color" content="#7c3aed" />
    
    <!-- Dark mode theme color -->
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#3b1876" />

    <!-- Additional Performance Optimizations -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    
    <!-- Script to prevent FOUC (Flash of Unstyled Content) for dark mode -->
    <script>
      // Apply dark mode immediately to prevent flash
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    </script>

      </div>
    </noscript>
