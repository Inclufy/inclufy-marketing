defaults.url=https://sentry.io/

# ─────────────────────────────────────────────────────────────────────────
# Sentry org/project/auth come from Xcode Cloud Shared Environment Variables:
#   SENTRY_ORG          → defaults.org fallback
#   SENTRY_PROJECT      → defaults.project fallback
#   SENTRY_AUTH_TOKEN   → auth.token fallback
#
# To enable production source-map upload:
#   1. Set those 3 env vars in App Store Connect → Xcode Cloud → Settings.
#   2. Remove SENTRY_DISABLE_AUTO_UPLOAD env var (or set to false).
#
# Setup-guide: docs/deploy-roadmaps/2026-05-07-sentry-production-setup.md
# Build 211 originally crashed because these were missing — see
# memory/feedback_check_untracked_imports.md for the lesson.
# ─────────────────────────────────────────────────────────────────────────
