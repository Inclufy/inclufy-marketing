<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <!-- Future-Proof / Leadership & Growth -->
  <rect width="280" height="200" rx="16" fill="#FFF3E0"/>
  <!-- Shield with upward arrow -->
  <g transform="translate(95, 20)">
    <path d="M45 5 L85 20 L85 65 Q85 100 45 120 Q5 100 5 65 L5 20z" fill="white" stroke="#FF6B35" stroke-width="2.5"/>
    <!-- Upward arrow inside shield -->
    <path d="M45 90 L45 45" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
    <path d="M32 58 L45 42 L58 58" stroke="#FF6B35" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Horizontal growth lines -->
    <line x1="30" y1="78" x2="60" y2="78" stroke="#FFCC80" stroke-width="2" stroke-linecap="round"/>
    <line x1="34" y1="86" x2="56" y2="86" stroke="#FFCC80" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- People/team circles -->
  <circle cx="55" cy="80" r="12" fill="#FF6B35" opacity="0.2"/>
  <circle cx="55" cy="76" r="5" fill="#FF6B35"/>
  <path d="M47 87 a8 8 0 0 1 16 0" fill="#FF6B35"/>
  <circle cx="225" cy="80" r="12" fill="#FF6B35" opacity="0.2"/>
  <circle cx="225" cy="76" r="5" fill="#FF6B35"/>
  <path d="M217 87 a8 8 0 0 1 16 0" fill="#FF6B35"/>
  <!-- Certificate/badge -->
  <g transform="translate(40, 140)">
    <circle cx="15" cy="15" r="15" fill="#FF6B35" opacity="0.15"/>
    <circle cx="15" cy="15" r="9" stroke="#FF6B35" stroke-width="2" fill="white"/>
    <path d="M11 15 l3 3 5-6" stroke="#FF6B35" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Star badge -->
  <g transform="translate(195, 140)">
    <circle cx="15" cy="15" r="15" fill="#FF6B35" opacity="0.15"/>
    <path d="M15 6 l2.5 5 5.5 0.8-4 3.9 0.9 5.3-4.9-2.6-4.9 2.6 0.9-5.3-4-3.9 5.5-0.8z" fill="#FF6B35"/>
  </g>
  <!-- Connecting dotted lines -->
  <line x1="70" y1="155" x2="195" y2="155" stroke="#FFCC80" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/>
</svg>
