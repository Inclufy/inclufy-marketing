<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <!-- AI-Activated / WorkBoost -->
  <rect width="280" height="200" rx="16" fill="#E3F2FD"/>
  <!-- Brain outline -->
  <g transform="translate(90, 30)">
    <path d="M50 10 Q70 0 80 15 Q95 10 95 30 Q105 40 95 55 Q100 70 85 75 Q85 90 70 85 Q60 95 50 85 Q40 95 30 85 Q15 90 15 75 Q0 70 5 55 Q-5 40 5 30 Q5 10 20 15 Q30 0 50 10z" fill="white" stroke="#2196F3" stroke-width="2.5"/>
    <!-- Neural network nodes -->
    <circle cx="35" cy="35" r="5" fill="#2196F3"/>
    <circle cx="65" cy="35" r="5" fill="#2196F3"/>
    <circle cx="50" cy="55" r="5" fill="#2196F3"/>
    <circle cx="30" cy="65" r="4" fill="#64B5F6"/>
    <circle cx="70" cy="65" r="4" fill="#64B5F6"/>
    <circle cx="50" cy="30" r="4" fill="#64B5F6"/>
    <!-- Connections -->
    <line x1="35" y1="35" x2="65" y2="35" stroke="#90CAF9" stroke-width="1.5"/>
    <line x1="35" y1="35" x2="50" y2="55" stroke="#90CAF9" stroke-width="1.5"/>
    <line x1="65" y1="35" x2="50" y2="55" stroke="#90CAF9" stroke-width="1.5"/>
    <line x1="30" y1="65" x2="50" y2="55" stroke="#90CAF9" stroke-width="1.5"/>
    <line x1="70" y1="65" x2="50" y2="55" stroke="#90CAF9" stroke-width="1.5"/>
    <line x1="50" y1="30" x2="35" y2="35" stroke="#90CAF9" stroke-width="1.5"/>
    <line x1="50" y1="30" x2="65" y2="35" stroke="#90CAF9" stroke-width="1.5"/>
  </g>
  <!-- Sparkle accents -->
  <path d="M60 40 l2 5 5 2-5 2-2 5-2-5-5-2 5-2z" fill="#FFB74D"/>
  <path d="M220 50 l2 4 4 2-4 2-2 4-2-4-4-2 4-2z" fill="#FFB74D"/>
  <path d="M45 130 l1.5 3 3 1.5-3 1.5-1.5 3-1.5-3-3-1.5 3-1.5z" fill="#FFB74D"/>
  <!-- Lightning bolt -->
  <g transform="translate(200, 110)">
    <path d="M15 0 L5 18 L12 18 L8 32 L22 12 L15 12 L20 0z" fill="#2196F3"/>
  </g>
  <!-- Data bars -->
  <rect x="40" y="155" width="12" height="25" rx="3" fill="#90CAF9"/>
  <rect x="58" y="145" width="12" height="35" rx="3" fill="#64B5F6"/>
  <rect x="76" y="135" width="12" height="45" rx="3" fill="#2196F3"/>
  <rect x="94" y="150" width="12" height="30" rx="3" fill="#64B5F6"/>
</svg>
