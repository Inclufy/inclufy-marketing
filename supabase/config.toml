# Supabase project config
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "InclufyMarketing"

# ═══════════════════════════════════════════════════════
# Edge Functions
# ═══════════════════════════════════════════════════════

# oauth-callback: verify_jwt must be FALSE.
# OAuth providers (LinkedIn, Meta, TikTok) redirect the user's browser to this
# endpoint after auth. The redirect is a top-level navigation from the
# provider's domain — no Authorization header is (or can be) attached.
# If verify_jwt is true, the Supabase gateway rejects the callback with
# UNAUTHORIZED_NO_AUTH_HEADER before our code runs, and OAuth is impossible.
[functions.oauth-callback]
verify_jwt = false

# publish-social: verify_jwt MUST stay true.
# Requests come from the authenticated mobile app with a user JWT. The
# function additionally asserts body.user_id matches the JWT subject to
# prevent service-role auth bypass (see commit f7b54b4 fix).
[functions.publish-social]
verify_jwt = true

[functions.product-issues]
verify_jwt = true

# send-email: server-to-server helper called by other edge functions
# (notify-issue-reported). The new Supabase API-key system no longer exposes
# the legacy JWT in auto-injected env vars, so the gateway rejects internal
# calls from sibling functions with INVALID_JWT_FORMAT. This function holds
# no PII and just forwards to Resend, so disabling verify_jwt is safe.
[functions.send-email]
verify_jwt = false

# notify-issue-reported: invoked by Supabase Database Webhook on
# product_issues INSERT. Webhooks send a service-role bearer the gateway
# accepts, so verify_jwt stays true.
[functions.notify-issue-reported]
verify_jwt = true

# resend-webhook: receives delivery events from Resend (delivered, bounced,
# complained, opened, clicked). Resend posts unauthenticated requests but
# signs them via Svix headers — the function verifies the signature itself.
# verify_jwt must be FALSE because Resend has no Supabase JWT to send.
[functions.resend-webhook]
verify_jwt = false

# register-push-token: called by mobile app on cold-start with the user's
# JWT. We need verify_jwt to extract user_id from the bearer.
[functions.register-push-token]
verify_jwt = true

# send-push: server-to-server fan-out helper, called by triggers and other
# edge functions using service-role auth. Same rationale as send-email —
# no user JWT involved, no PII in request body beyond the user IDs already
# scoped by the caller.
[functions.send-push]
verify_jwt = false

# submit-post-for-approval: called by the post author (mobile/web) — needs
# user JWT to identify caller and check membership.
[functions.submit-post-for-approval]
verify_jwt = true

# process-post-approval: called by an admin/owner of the org — also needs
# user JWT for the role check.
[functions.process-post-approval]
verify_jwt = true

# gdpr-account-delete: GDPR Art. 17 — user-initiated. JWT required to
# identify the user being deleted. 3-tier: hard-delete strictly personal
# tables, preserve org content, anonymize profile + ban auth user.
[functions.gdpr-account-delete]
verify_jwt = true

# gdpr-export: GDPR Art. 15 — JSON export of user's personal data across
# ~30 user-scoped tables. Used by both AMOS mobile and marketing-web.
[functions.gdpr-export]
verify_jwt = true
