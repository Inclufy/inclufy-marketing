<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="40%" style="stop-color:#EC4899"/>
      <stop offset="70%" style="stop-color:#F9A8D4"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
    <linearGradient id="bars" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F9A8D4"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background with the gradient -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect width="512" height="512" rx="108" fill="none" stroke="white" stroke-width="1.5" opacity="0.15"/>

  <!-- Rising bars -->
  <g transform="translate(256,240)">
    <rect x="-80" y="10" width="44" height="105" rx="14" fill="white" opacity="0.95"/>
    <rect x="-20" y="-45" width="44" height="160" rx="14" fill="white" opacity="0.95"/>
    <rect x="40" y="-95" width="44" height="210" rx="14" fill="white" opacity="0.95"/>

    <!-- Sparkle on tallest bar -->
    <circle cx="62" cy="-114" r="16" fill="white" filter="url(#glow)" opacity="0.9"/>

    <!-- Accent dots -->
    <circle cx="-58" cy="-14" r="7" fill="white" opacity="0.6"/>
    <circle cx="2" cy="-68" r="7" fill="white" opacity="0.6"/>
  </g>
</svg>
