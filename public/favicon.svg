<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#9333EA"/>
    </linearGradient>
    <linearGradient id="horn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E2E8F0"/>
      <stop offset="100%" style="stop-color:#F8B4D9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Megaphone body -->
  <g transform="translate(256,256)">
    <!-- Cone -->
    <polygon points="-40,-20 80,-80 80,80 -40,20" fill="url(#horn)" opacity="0.95"/>
    <!-- Handle -->
    <rect x="-70" y="-15" width="35" height="30" rx="6" fill="#818CF8" opacity="0.9"/>
    <!-- Sound waves -->
    <path d="M100,-50 Q130,-30 130,0 Q130,30 100,50" fill="none" stroke="#F9A8D4" stroke-width="4" opacity="0.6"/>
    <path d="M120,-70 Q160,-40 160,0 Q160,40 120,70" fill="none" stroke="#F9A8D4" stroke-width="3" opacity="0.4"/>
    <!-- Stars/sparkles -->
    <circle cx="-80" cy="-80" r="4" fill="#F9A8D4" opacity="0.8"/>
    <circle cx="-100" cy="-60" r="3" fill="#F9A8D4" opacity="0.6"/>
    <circle cx="60" cy="-100" r="3" fill="#F9A8D4" opacity="0.7"/>
    <circle cx="110" cy="-90" r="2.5" fill="#F9A8D4" opacity="0.5"/>
    <circle cx="-60" cy="80" r="3.5" fill="#F9A8D4" opacity="0.6"/>
    <circle cx="100" cy="80" r="3" fill="#F9A8D4" opacity="0.5"/>
    <!-- Heart -->
    <path d="M110,-30 C115,-40 130,-40 130,-28 C130,-40 145,-40 140,-30 L125,-15 Z" fill="#F9A8D4" opacity="0.7" transform="scale(0.7)"/>
    <!-- @ symbol -->
    <circle cx="-90" cy="-90" r="8" fill="none" stroke="#F9A8D4" stroke-width="2" opacity="0.5"/>
    <path d="M-86,-90 A4,4 0 1,1 -86,-90.01" fill="none" stroke="#F9A8D4" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- MARKETING text -->
  <text x="256" y="470" text-anchor="middle" fill="white" font-family="Inter,sans-serif" font-size="36" font-weight="600" letter-spacing="8" opacity="0.8">MARKETING</text>
</svg>
