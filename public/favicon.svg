<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F9A8D4"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="108" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>

  <!-- Abstract "I" letterform made of rising bars/signal -->
  <g transform="translate(256,240)">
    <!-- Three rising bars — representing growth, signal, content channels -->
    <rect x="-80" y="10" width="40" height="100" rx="12" fill="white" opacity="0.95"/>
    <rect x="-20" y="-40" width="40" height="150" rx="12" fill="white" opacity="0.95"/>
    <rect x="40" y="-90" width="40" height="200" rx="12" fill="white" opacity="0.95"/>

    <!-- Sparkle dot on top of tallest bar — the "magic" -->
    <circle cx="60" cy="-108" r="14" fill="url(#accent)" filter="url(#glow)"/>

    <!-- Small accent dots — data/content particles -->
    <circle cx="-60" cy="-12" r="6" fill="url(#accent)" opacity="0.8"/>
    <circle cx="0" cy="-62" r="6" fill="url(#accent)" opacity="0.8"/>
  </g>
</svg>
