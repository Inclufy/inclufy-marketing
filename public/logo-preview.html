<!DOCTYPE html>
<html>
<head>
  <title>Inclufy Logo Preview</title>
  <style>
    body { margin: 0; background: #0a0a0f; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; gap: 60px; padding: 40px; }
    .section { text-align: center; }
    .section h2 { color: #a78bfa; font-size: 14px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 24px; }
    .row { display: flex; gap: 40px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .card { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 32px; display: flex; align-items: center; justify-content: center; }
    .card.dark { background: #0a0a0f; }
    .card.light { background: #f8f9fa; }
    .label { color: #6b7280; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="section">
    <h2>Favicon / App Icon</h2>
    <div class="row">
      <div>
        <div class="card"><img src="favicon.svg" width="128" height="128"></div>
        <div class="label">128px</div>
      </div>
      <div>
        <div class="card"><img src="favicon.svg" width="64" height="64"></div>
        <div class="label">64px</div>
      </div>
      <div>
        <div class="card"><img src="favicon.svg" width="32" height="32"></div>
        <div class="label">32px</div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Full Logo (dark background)</h2>
    <div class="row">
      <div class="card" style="min-width: 360px;">
        <img src="logo-inclufy.svg" width="280" height="64">
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Full Logo (light background)</h2>
    <div class="row">
      <div class="card light" style="min-width: 360px;">
        <img src="logo-inclufy-dark.svg" width="280" height="64">
      </div>
    </div>
  </div>
</body>
</html>
