<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 64">
  <defs>
    <linearGradient id="logobg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C084FC"/>
      <stop offset="50%" style="stop-color:#F472B6"/>
      <stop offset="100%" style="stop-color:#FCD34D"/>
    </linearGradient>
    <linearGradient id="textgrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9333EA"/>
      <stop offset="50%" style="stop-color:#DB2777"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#logobg2)"/>

  <!-- Rising bars -->
  <g transform="translate(32,30)">
    <rect x="-16" y="2" width="9" height="21" rx="3" fill="white" opacity="0.95"/>
    <rect x="-4" y="-9" width="9" height="32" rx="3" fill="white" opacity="0.95"/>
    <rect x="8" y="-19" width="9" height="42" rx="3" fill="white" opacity="0.95"/>
    <circle cx="12.5" cy="-23" r="3.2" fill="white" opacity="0.85"/>
    <circle cx="-11.5" cy="-4" r="1.8" fill="white" opacity="0.5"/>
    <circle cx="0.5" cy="-15" r="1.8" fill="white" opacity="0.5"/>
  </g>

  <!-- Brand name with gradient (for light backgrounds) -->
  <text x="80" y="35" fill="url(#textgrad2)" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5">Inclufy<tspan fill="#DB2777">.</tspan></text>

  <!-- Tagline: AI MARKETING -->
  <text x="80" y="54" fill="#6B7280" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500" letter-spacing="1.5"><tspan fill="url(#textgrad2)" font-weight="700">AI</tspan> MARKETING</text>
</svg>
